name: release.yml
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    uses: ./.github/workflows/build.yml
    name: Build release artifacts

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: jars
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.jar